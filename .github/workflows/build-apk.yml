name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0-dias
          name: "APK v4.0 - Dias de la semana, limpiar dia y mejoras"
          body: |
            APK de depuracion (version 4.0).
            Novedades: selector de dia de la semana (datos independientes por dia),
            boton para limpiar/reiniciar el dia, marca de "dia completado",
            metas con barras del color de cada atributo y notas abribles/editables.
            Descarga `app-debug.apk` desde los Assets e instalalo en tu Samsung A15
            (habilita "Instalar apps de origen desconocido").
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
